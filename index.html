        // BASE DE DATOS DE TUS 196 FALTANTES (ESTRICTA)

        // BASE DE DATOS DE TUS REPETIDAS (ESTRICTA - DEPURADA DE CONFLICTOS)
        const REPEATED_LIST = {
            FWC: [2, 3, 9, 10, 12, 14], MEX: [5, 6, 11, 16, 19], RSA: [6, 11], KOR: [1, 11, 12, 14, 20],
            CAN: [2, 4, 11, 14], QAT: [3, 6, 17, 19], SUI: [3, 5, 6, 14, 16], BRA: [5, 6, 19], MAR: [11, 13, 15],

            CUW: [5, 19], CIV: [14], ECU: [7, 9, 19], NED: [8, 9, 13], JPN: [1, 9, 14],
            TUN: [2, 8, 11, 12, 15, 20], BEL: [1, 5, 9, 16, 17], EGY: [1, 2, 3, 6, 7, 15],
            IRN: [1, 2, 5, 6, 15, 20], NZL: [1, 11, 14], CPV: [1, 15, 18, 20], KSA: [9, 11, 12, 13, 15],
            URU: [6, 8, 15, 16], FRA: [2, 6, 14, 17], SEN: [2, 3, 10, 15, 19],
            NOR: [2, 3, 4, 8, 10, 15, 16, 17, 18], ARG: [3, 5, 12, 14], ALG: [4, 5, 9, 14, 19],

        };

        const APP_ID = "miranda-tracker-v10-prod";

        // Función de generación nativa auto-alimentada
        const generateInitialStickers = () => {
            const initial = [];
            SECTION_LIST.forEach(section => {
                const code = section.code;
                const missingNums = MISSING_LIST[code] || [];
                const repeatedNums = REPEATED_LIST[code] || [];
                for (let i = 1; i <= section.count; i++) {
                    let count = 1; // Por defecto obtenida
                    if (missingNums.includes(i)) {
                        count = 0;
                    } else if (repeatedNums.includes(i)) {
                        count = 2; // Repetida por defecto (1 álbum + 1 extra)
                    }
                    initial.push({ id: `${code}${i}`, code, num: i, count });
                }
            });
            return initial;
        };

        const formatStickersGrouped = (stickerList) => {
            const grouped = {};
            stickerList.forEach(s => {
                if (!grouped[s.code]) {
                    grouped[s.code] = [];
                }
                grouped[s.code].push(s.num);
            });

            const formattedLines = [];
            SECTION_LIST.forEach(section => {
                const nums = grouped[section.code];
                if (nums && nums.length > 0) {
                    const sortedNums = [...nums].sort((a, b) => a - b);
                    formattedLines.push(`${section.code} ${section.flag}: ${sortedNums.join(', ')}`);
                }
            });

            return formattedLines.join('\n');
        };

        // Convertir y normalizar listas antiguas al formato estándar
        const normalizeStickers = (loadedList) => {
            const countMap = {};
            loadedList.forEach(s => {
                const cleanId = s.id.replace(/\s+/g, '').toUpperCase();
                countMap[cleanId] = (countMap[cleanId] || 0) + s.count;
            });

            const fresh = generateInitialStickers();
            return fresh.map(s => {
                const cleanId = s.id.replace(/\s+/g, '').toUpperCase();
                return {
                    ...s,
                    count: countMap[cleanId] || 0
                };
            });
        };

        const Icon = ({ name, size = 20, className = "" }) => {
            useEffect(() => { if (window.lucide) lucide.createIcons(); }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const App = () => {
            const [stickers, setStickers] = useState(() => {
                const saved1 = localStorage.getItem("miranda-sticker-tracker-2026");
                const saved2 = localStorage.getItem("miranda-tracker-v10-prod");
                const saved = saved1 || saved2;
                
                if (saved) return JSON.parse(saved);
                return generateInitialStickers();
            });

            const [activeTab, setActiveTab] = useState('dashboard');
            const [filter, setFilter] = useState('');
            const [selectedSection, setSelectedSection] = useState('MEX');
            const [notification, setNotification] = useState(null);
            const [shareMode, setShareMode] = useState('both');
            const [showSettings, setShowSettings] = useState(false);
            const [showRecoveryModal, setShowRecoveryModal] = useState(false);
            const [dashboardFilter, setDashboardFilter] = useState('pending'); // 'all', 'pending', 'done'
            const [albumSubFilter, setAlbumSubFilter] = useState('all'); // 'all', 'missing', 'repeated'

            // Sincronización en la Nube
            const [syncCode, setSyncCode] = useState(() => localStorage.getItem('panini_sync_code') || '');
            const [collectorName, setCollectorName] = useState(() => localStorage.getItem('panini_collector_name') || '');
            const [cloudStatus, setCloudStatus] = useState('local'); // 'local', 'syncing', 'error'
            const [logs, setLogs] = useState(["Iniciando aplicación..."]);

            // Historial de códigos para evitar errores de dedo
            const [syncHistory, setSyncHistory] = useState(() => {
                try {
                    const saved = localStorage.getItem('panini_sync_history');
                    return saved ? JSON.parse(saved) : [];
                } catch (e) {
                    return [];
                }
            });

            // Almacén de copias de seguridad encontradas
            const [allBackups, setAllBackups] = useState([]);

            // Estado para el resolutor de conflictos en tiempo real
            const [conflictState, setConflictState] = useState({
                show: false,
                localCount: 0,
                cloudCount: 0,
                cloudData: null,
                localData: null
            });

            // Estados temporales del Modal de Ajustes
            const [inputSyncCode, setInputSyncCode] = useState(syncCode);
            const [inputCollectorName, setInputCollectorName] = useState(collectorName);

            // Comparador (Matchmaker)
            const [friendCode, setFriendCode] = useState('');
            const [friendStickers, setFriendStickers] = useState(null);
            const [friendName, setFriendName] = useState('');

            const dbInstance = useRef(null);
            const unsubscribeFirestore = useRef(null);
            const activeAppId = useRef('miranda-tracker-app'); // Ruta activa identificada
            
            // Ref para tener el estado actual de los stickers en callbacks de Firebase
            const stickersRef = useRef(stickers);
            useEffect(() => {
                stickersRef.current = stickers;
            }, [stickers]);

            const addLog = (msg) => {
                setLogs(prev => [...prev.slice(-8), `[${new Date().toLocaleTimeString()}] ${msg}`]);
            };

            // DEFINICIÓN DE COPIADO DE SEGURIDAD EN LA NUBE
            const pushToCloud = async (newStickers, newName = collectorName) => {
                if (!syncCode || !dbInstance.current) return;
                
                const cleanCode = syncCode.trim().toUpperCase();
                const docRef = dbInstance.current
                    .collection('artifacts')
                    .doc(activeAppId.current)
                    .collection('public')
                    .doc('data')
                    .collection('user_stickers')
                    .doc(cleanCode);
                
                try {
                    await docRef.set({ 
                        stickers: newStickers, 
                        collectorName: newName,
                        lastUpdated: new Date() 
                    }, { merge: true });
                    addLog("Cambio guardado en la nube.");
                } catch (e) {
                    console.error("Fallo al escribir en la nube:", e);
                    addLog(`Error de guardado: ${e.message}`);
                }
            };

            // Nombre dinámico en pantalla
            const displayName = useMemo(() => {
                if (collectorName) return collectorName;
                if (syncCode) {
                    const cleanCode = syncCode.trim().toUpperCase();
                    if (cleanCode.startsWith("MATEO")) return "Mateo";
                    if (cleanCode.startsWith("MIRANDA")) return "Miranda";
                    return cleanCode;
                }
                return "Coleccionista";
            }, [collectorName, syncCode]);

            // Guardamos localmente en ambas claves posibles para evitar cualquier pérdida de memoria
            useEffect(() => {
                localStorage.setItem("miranda-tracker-v10-prod", JSON.stringify(stickers));
                localStorage.setItem("miranda-sticker-tracker-2026", JSON.stringify(stickers));
            }, [stickers]);

            // Sincronizar estados locales del modal cuando se abra
            useEffect(() => {
                if (showSettings) {
                    setInputSyncCode(syncCode);
                    setInputCollectorName(collectorName);
                }
            }, [showSettings]);

            // Sincronización de Firebase
            useEffect(() => {
                const initFirebase = () => {
                    addLog("Conectando con base de datos...");
                    try {
                        if (!window.firebase) {
                            addLog("Esperando librerías...");
                            setTimeout(initFirebase, 500);
                            return;
                        }

                        if (window.firebase.apps.length === 0) {
                            window.firebase.initializeApp(CONFIG_PERSONAL_FIREBASE);
                        }
                        
                        dbInstance.current = window.firebase.firestore();
                        setCloudStatus('syncing');
                        addLog("Conectado con Firebase.");
                    } catch (err) {
                        console.error("Fallo de conexión a Firebase:", err);
                        setCloudStatus('error');
                        addLog(`Error de inicio: ${err.message}`);
                    }
                };
                initFirebase();
            }, []);

            // Escuchar cambios de Firestore en tiempo real (Lectura con Resolutor de Conflictos)
            const startRealTimeListener = (appId, cleanCode) => {
                if (unsubscribeFirestore.current) unsubscribeFirestore.current();
                
                const docRef = dbInstance.current
                    .collection('artifacts')
                    .doc(appId)
                    .collection('public')
                    .doc('data')
                    .collection('user_stickers')
                    .doc(cleanCode);

                setCloudStatus('syncing');
                
                let isFirstLoad = true;

                unsubscribeFirestore.current = docRef.onSnapshot((docSnap) => {
                    if (docSnap.exists) {
                        const data = docSnap.data();
                        if (data && data.stickers) {
                            const cloudStickers = normalizeStickers(data.stickers);
                            const cloudOwned = cloudStickers.filter(s => s.count > 0).length;
                            
                            const localStickers = stickersRef.current;
                            const localOwned = localStickers.filter(s => s.count > 0).length;

                            if (isFirstLoad) {
                                isFirstLoad = false;
                                // En el arranque, validamos si existe un conflicto de versiones
                                if (localOwned > cloudOwned && cloudOwned > 0 && localOwned !== 992) {
                                    setConflictState({
                                        show: true,
                                        localCount: localOwned,
                                        cloudCount: cloudOwned,
                                        cloudData: cloudStickers,
                                        localData: localStickers
                                    });
                                    addLog(`¡Conflicto detectado al arrancar! Local: ${localOwned} un. vs Nube: ${cloudOwned} un.`);
                                } else {
                                    setStickers(cloudStickers);
                                    addLog(`Sincronizado con la nube (${cloudOwned} estampas).`);
                                }
                            } else {
                                setStickers(cloudStickers);
                            }
                            setCloudStatus('syncing');
                        }
                    } else {
                        // Si la nube está vacía pero el local tiene datos, la respaldamos de inmediato
                        const localStickers = stickersRef.current;
                        const localOwned = localStickers.filter(s => s.count > 0).length;
                        if (localOwned > 0) {
                            pushToCloud(localStickers);
                            addLog("Nube vacía. Subiendo progreso actual de respaldo...");
                        }
                    }
                }, (err) => {
                    console.error("Firestore listen failed:", err);
                    setCloudStatus('error');
                    addLog(`Error de escucha: ${err.message}`);
                });
            };

            // RESOLUTOR MANUAL DE CONFLICTOS
            const resolveConflict = async (useLocal) => {
                addLog(`Resolviendo conflicto: Seleccionado ${useLocal ? 'Local' : 'Nube'}`);
                
                const targetStickers = useLocal ? conflictState.localData : conflictState.cloudData;
                
                setConflictState({ show: false, localCount: 0, cloudCount: 0, cloudData: null, localData: null });
                
                if (targetStickers) {
                    setStickers(targetStickers);
                    if (useLocal) {
                        setNotification("Subiendo progreso a la nube...");
                        try {
                            await pushToCloud(targetStickers);
                            setNotification("¡Nube actualizada con éxito!");
                        } catch (err) {
                            addLog(`Error al subir: ${err.message}`);
                            setNotification("Error de red. Guardado localmente.");
                        }
                    } else {
                        setNotification("¡Dispositivo sincronizado con éxito!");
                    }
                }
                setTimeout(() => setNotification(null), 3000);
            };

            // Escaneo Profundo de LocalStorage para buscar claves legacy
            const scanAllLocalStorage = () => {
                const backups = [];
                for (let i = 0; i < localStorage.length; i++) {
                    const key = localStorage.key(i);
                    try {
                        const val = localStorage.getItem(key);
                        if (val && (val.startsWith('[') || val.startsWith('{'))) {
                            const parsed = JSON.parse(val);
                            if (Array.isArray(parsed) && parsed.length > 0) {
                                const sample = parsed[0];
                                if (sample && typeof sample === 'object' && ('id' in sample || 'num' in sample) && 'count' in sample) {
                                    const ownedCount = parsed.filter(s => s.count > 0).length;
                                    if (ownedCount > 0) {
                                        backups.push({
                                            type: 'local',
                                            source: `iPad (Memoria: ${key})`,
                                            key: key,
                                            stickers: parsed,
                                            ownedCount: ownedCount,
                                            repeatedCount: parsed.reduce((acc, s) => acc + (s.count > 1 ? s.count - 1 : 0), 0)
                                        });
                                    }
                                }
                            }
                        }
                    } catch (e) {}
                }
                return backups;
            };

            // Escaneo Profundo de Firestore buscando en todas las cajitas y códigos posibles (Agresivo)
            const scanFirestoreBackups = async (codes) => {
                const pathsToTry = ['miranda-tracker-prod-app', 'miranda-tracker-app', 'miranda-tracker-prod', 'default-app-id'];
                const foundBackups = [];
                const uniqueCodes = [...new Set(codes.map(c => c.trim().toUpperCase()))].filter(Boolean);

                for (const path of pathsToTry) {
                    for (const code of uniqueCodes) {
                        try {
                            const docRef = dbInstance.current
                                .collection('artifacts')
                                .doc(path)
                                .collection('public')
                                .doc('data')
                                .collection('user_stickers')
                                .doc(code);
                            
                            const snap = await docRef.get();
                            if (snap.exists) {
                                const data = snap.data();
                                if (data && data.stickers) {
                                    const ownedCount = data.stickers.filter(s => s.count > 0).length;
                                    if (ownedCount > 0) {
                                        foundBackups.push({
                                            type: 'cloud',
                                            source: `Nube (Canal ${code} en [${path}])`,
                                            appId: path,
                                            docId: code,
                                            stickers: data.stickers,
                                            collectorName: data.collectorName || code,
                                            ownedCount: ownedCount,
                                            repeatedCount: data.stickers.reduce((acc, s) => acc + (s.count > 1 ? s.count - 1 : 0), 0),
                                            lastUpdated: data.lastUpdated ? data.lastUpdated.toDate().toLocaleString() : 'Desconocida'
                                        });
                                    }
                                }
                            }
                        } catch (e) {
                            console.error(`Error escaneando ${path} -> ${code}:`, e);
                        }
                    }
                }
                return foundBackups;
            };

            // Ejecutar el Escáner de Recuperación Familiar al Inicio o cambio de código
            const runFullRecoveryScan = async () => {
                addLog("Iniciando escáner de recuperación...");
                const localBackups = scanAllLocalStorage();
                
                // Generar lista de códigos potenciales a buscar
                const codesToScan = [
                    syncCode,
                    inputSyncCode,
                    'MIRANDA26',
                    'MIARNDA26',
                    'MIRANDA2026',
                    'MIRA26',
                    'MATEO26',
                    'SOBRINO26',
                    'SANTI26',
                    'SANTIAGO26',
                    ...syncHistory
                ].filter(Boolean);

                try {
                    const cloudBackups = await scanFirestoreBackups(codesToScan);
                    const combined = [...localBackups, ...cloudBackups];
                    
                    // Remover duplicados por conteo idéntico
                    const seen = new Set();
                    const unique = combined.filter(b => {
                        const key = `${b.type}-${b.ownedCount}-${b.repeatedCount}`;
                        if (seen.has(key)) return false;
                        seen.add(key);
                        return true;
                    });
                    
                    setAllBackups(unique);
                    addLog(`Búsqueda completa: ¡Halladas ${unique.length} copias con datos!`);
                    
                    // Si encontramos una versión en la nube con datos que sea la mejor, proponerla
                    const cloudBest = unique.find(b => b.type === 'cloud' && b.ownedCount > 0);
                    if (cloudBest && stickers.filter(s => s.count > 0).length === 0) {
                        addLog(`Autocargando mejor copia de seguridad desde: ${cloudBest.source}`);
                        setStickers(normalizeStickers(cloudBest.stickers));
                        setCollectorName(cloudBest.collectorName);
                        setSyncCode(cloudBest.docId);
                    }
                } catch (e) {
                    setAllBackups(localBackups);
                    addLog("Recuperación completa basada solo en copias locales.");
                }
            };

            // DESCARGA MANUAL DE EMERGENCIA (Ignora el escudo de seguridad)
            const forceDownloadFromCloud = async () => {
                const targetCode = syncCode || inputSyncCode || 'MIRANDA26';
                const cleanCode = targetCode.trim().toUpperCase();
                addLog(`Forzando descarga desde canal ${cleanCode}...`);
                setCloudStatus('syncing');
                try {
                    const docRef = dbInstance.current
                        .collection('artifacts')
                        .doc(activeAppId.current)
                        .collection('public')
                        .doc('data')
                        .collection('user_stickers')
                        .doc(cleanCode);
                    
                    const snap = await docRef.get();
                    if (snap.exists) {
                        const data = snap.data();
                        if (data && data.stickers) {
                            const normalized = normalizeStickers(data.stickers);
                            setStickers(normalized);
                            localStorage.setItem("miranda-tracker-v10-prod", JSON.stringify(normalized));
                            localStorage.setItem("miranda-sticker-tracker-2026", JSON.stringify(normalized));
                            const owned = normalized.filter(s => s.count > 0).length;
                            addLog(`¡Descarga forzada exitosa! Cargadas ${owned} láminas.`);
                            setNotification("¡Sincronizado con éxito desde la Nube!");
                        } else {
                            addLog("El canal en la nube no contiene estampas.");
                            setNotification("Canal vacío en la nube.");
                        }
                    } else {
                        addLog("No se encontró el documento en la nube.");
                        setNotification("No hay datos en este canal de la nube.");
                    }
                } catch (e) {
                    console.error(e);
                    addLog(`Error en descarga forzada: ${e.message}`);
                    setNotification("Error al descargar de la nube.");
                }
                setTimeout(() => setNotification(null), 3000);
            };

            // Renderizado seguro de banderas en la interfaz web (Usa FlagCDN para compatibilidad completa)
            const renderFlagImg = (sectionCode, emojiFallback, className = "w-5 h-4 inline-block object-cover rounded shadow-sm mr-2") => {
                const section = SECTION_LIST.find(s => s.code === sectionCode);
                if (!section) return emojiFallback;
                
                // Elementos especiales que no son países en FlagCDN
                if (sectionCode === 'FWC' || sectionCode === 'CC') {
                    return <span className="inline-block mr-2 text-sm leading-none">{section.flag}</span>;
                }
                
                // Mostrar hermosa bandera SVG de FlagCDN con fallback
                return (
                    <img 
                        src={`https://flagcdn.com/w40/${section.flagcdn}.png`} 
                        alt={section.name} 
                        className={className}
                        onError={(e) => {
                            e.target.style.display = 'none'; // Fallback silencioso si hay algún error
                        }}
                    />
                );
            };

            // Inicializar escáner cuando Firebase esté listo
            useEffect(() => {
                if (dbInstance.current) {
                    runFullRecoveryScan();
                    if (syncCode) {
                        startRealTimeListener(activeAppId.current, syncCode.trim().toUpperCase());
                    }
                }
            }, [dbInstance.current, syncCode]);

            const stats = useMemo(() => {
                const total = stickers.length;
                const ownedCount = stickers.filter(s => s.count > 0).length;
                const repeatedCount = stickers.reduce((acc, s) => acc + (s.count > 1 ? s.count - 1 : 0), 0);
                const progress = (ownedCount / total) * 100;
                
                const sectionsData = SECTION_LIST.map(section => {
                    const group = stickers.filter(s => s.code === section.code);
                    const obtained = group.filter(s => s.count > 0).length;
                    const missing = section.count - obtained;
                    const percent = (obtained / section.count) * 100;
                    const repeated = group.reduce((acc, s) => acc + (s.count > 1 ? s.count - 1 : 0), 0);
                    return { 
                        ...section, 
                        obtained, 
                        missing,
                        percent,
                        repeated,
                        isDone: obtained === section.count 
                    };
                });

                const completedCount = sectionsData.filter(s => s.isDone).length;

                // Cálculo de Estrategia de Compra
                const ratioOwned = ownedCount / total;
                const probNew = (1 - Math.pow(ratioOwned, 5)) * 100;

                return { total, ownedCount, repeatedCount, progress, completedCount, sectionsData, probNew };
            }, [stickers]);

            // Deducir si existe una copia de seguridad con más estampas que la actual (Ignorar si el local es 100% erróneo)
            const betterBackups = useMemo(() => {
                const currentOwned = stickers.filter(s => s.count > 0).length;
                if (currentOwned === 992) {
                    // Si el iPad marca 100% erróneo, mostramos cualquier copia que tenga progreso real menor a 992 pero mayor a 0
                    return allBackups.filter(b => b.ownedCount < 992 && b.ownedCount > 0);
                }
                return allBackups.filter(b => b.ownedCount > currentOwned);
            }, [allBackups, stickers]);

            const updateCount = (id, delta) => {
                const next = stickers.map(s => s.id === id ? { ...s, count: Math.max(0, s.count + delta) } : s);
                setStickers(next);
                if (syncCode) pushToCloud(next);
            };

            // Guarda los ajustes del Modal de forma manual
            const handleSaveConfig = () => {
                const cleanCode = inputSyncCode.trim().toUpperCase();
                setSyncCode(cleanCode);
                setCollectorName(inputCollectorName);
                
                localStorage.setItem('panini_sync_code', cleanCode);
                localStorage.setItem('panini_collector_name', inputCollectorName);
                
                // Actualizar historial local de códigos
                setSyncHistory(prev => {
                    const next = [cleanCode, ...prev.filter(x => x !== cleanCode)].slice(0, 5);
                    localStorage.setItem('panini_sync_history', JSON.stringify(next));
                    return next;
                });
                
                setShowSettings(false);
                setNotification("Ajustes guardados");
                setTimeout(() => setNotification(null), 3000);
            };

            // Buscar datos de un amigo para comparar (Matchmaker cruzado robusto)
            const checkFriendSync = async () => {
                if (!dbInstance.current || !friendCode) return;
                const cleanFriendCode = friendCode.trim().toUpperCase();
                addLog(`Buscando datos de amigo: ${cleanFriendCode}...`);
                
                const pathsToTry = ['miranda-tracker-prod-app', 'miranda-tracker-app', 'miranda-tracker-prod', 'default-app-id'];
                let friendFound = null;

                for (const path of pathsToTry) {
                    try {
                        const docRef = dbInstance.current
                            .collection('artifacts')
                            .doc(path)
                            .collection('public')
                            .doc('data')
                            .collection('user_stickers')
                            .doc(cleanFriendCode);
                            
                        const snap = await docRef.get();
                        if (snap.exists) {
                            const data = snap.data();
                            if (data && data.stickers) {
                                friendFound = data;
                                addLog(`¡Amigo encontrado en ruta [${path}]!`);
                                break;
                            }
                        }
                    } catch (e) {
                        console.error(e);
                    }
                }

                if (friendFound) {
                    setFriendStickers(friendFound.stickers);
                    setFriendName(friendFound.collectorName || cleanFriendCode);
                    setNotification(`¡Comparando con ${friendFound.collectorName || cleanFriendCode}!`);
                } else {
                    setNotification("Código de amigo no encontrado.");
                    setFriendStickers(null);
                }
                setTimeout(() => setNotification(null), 3000);
            };

            const exchangeAnalysis = useMemo(() => {
                if (!friendStickers) return null;

                const iCanGive = stickers.filter(mySticker => {
                    const friendSticker = friendStickers.find(fs => fs.id === mySticker.id);
                    return mySticker.count > 1 && friendSticker && friendSticker.count === 0;
                }).map(s => s.id);

                const friendCanGive = friendStickers.filter(friendSticker => {
                    const mySticker = stickers.find(ms => ms.id === friendSticker.id);
                    return friendSticker.count > 1 && mySticker && mySticker.count === 0;
                }).map(s => s.id);

                return { iCanGive, friendCanGive };
            }, [stickers, friendStickers]);

            const generateShareText = () => {
                const missingStickers = stickers.filter(s => s.count === 0);
                const repeatsStickers = stickers.filter(s => s.count > 1);

                const missingText = formatStickersGrouped(missingStickers);
                const repeatsText = formatStickersGrouped(repeatsStickers);

                let t = `⚽ *ÁLBUM DE ${displayName.toUpperCase()} 2026* ⚽\n`;
                if (shareMode === 'both' || shareMode === 'repeats') t += `\n✅ *REPETIDAS PARA CAMBIAR:* \n${repeatsText || 'Ninguna'}\n`;
                if (shareMode === 'both' || shareMode === 'missing') t += `\n❌ *ME FALTAN:* \n${missingText || 'Ninguna'}\n`;
                return t + "\n_¡Intercambiemos!_";
            };

            const copyToClipboard = () => {
                const el = document.createElement('textarea');
                el.value = generateShareText(); document.body.appendChild(el);
                el.select(); document.execCommand('copy');
                document.body.removeChild(el);
                setNotification("¡Lista copiada!");
                setTimeout(() => setNotification(null), 3000);
            };

            const exportData = () => {
                const dataUri = 'data:application/json;charset=utf-8,'+ encodeURIComponent(JSON.stringify(stickers));
                const link = document.createElement('a');
                link.setAttribute('href', dataUri);
                link.setAttribute('download', `${syncCode || 'resguardo'}_panini_backup.json`);
                link.click();
                setNotification("¡Copia de seguridad guardada!");
                setTimeout(() => setNotification(null), 3000);
            };

            const importData = (event) => {
                const file = event.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const parsed = JSON.parse(e.target.result);
                        setStickers(parsed);
                        if (syncCode) pushToCloud(parsed);
                        setNotification("¡Progreso restaurado!");
                    } catch (err) {
                        setNotification("Error al leer el archivo.");
                    }
                    setTimeout(() => setNotification(null), 3000);
                };
                reader.readAsText(file);
            };

            // Filtrado de las selecciones en el Dashboard
            const filteredDashboardSections = useMemo(() => {
                return stats.sectionsData.filter(s => {
                    if (dashboardFilter === 'pending') return !s.isDone;
                    if (dashboardFilter === 'done') return s.isDone;
                    return true;
                });
            }, [stats.sectionsData, dashboardFilter]);

            // Filtrado de estampas en el Álbum con subfiltros inteligentes
            const displayedStickers = useMemo(() => {
                let list = stickers;
                if (!filter) {
                    list = stickers.filter(s => s.code === selectedSection);
                } else {
                    const search = filter.toUpperCase();
                    list = stickers.filter(s => s.id.includes(search));
                }

                // Aplicar filtros adicionales de álbum
                if (albumSubFilter === 'missing') return list.filter(s => s.count === 0);
                if (albumSubFilter === 'repeated') return list.filter(s => s.count > 1);
                return list;
            }, [stickers, filter, selectedSection, albumSubFilter]);

            const currentSectionInfo = SECTION_LIST.find(s => s.code === selectedSection) || SECTION_LIST[0];

            return (
                <div className="min-h-screen pb-24">
                    {/* Header */}
                    <header className="bg-gradient-to-r from-blue-700 via-indigo-800 to-blue-900 text-white p-6 shadow-xl sticky top-0 z-50">
                        <div className="max-w-4xl mx-auto flex justify-between items-center text-center sm:text-left">
                            <div className="flex items-center gap-3">
                                <button onClick={() => setShowSettings(true)} className="p-2 bg-white/10 hover:bg-white/20 rounded-lg shadow-inner transition-all flex items-center gap-2">
                                    <Icon name="cloud" className={cloudStatus === 'syncing' ? 'text-green-400' : 'text-red-400 animate-pulse'} size={24} />
                                    <span className="text-[9px] font-black uppercase tracking-wider hidden sm:inline">Ajustes</span>
                                </button>
                                <div>
                                    <h1 className="text-xl font-black italic tracking-tighter">ÁLBUM DE {displayName.toUpperCase()}</h1>
                                    <p className="text-blue-200 text-[8px] font-bold uppercase tracking-widest leading-none">
                                        {syncCode ? `Canal Nube: ${syncCode}` : "SÓLO DISPOSITIVO"}
                                    </p>
                                </div>
                            </div>
                            <div className="text-right">
                                <span className="text-3xl font-black italic">{stats.progress.toFixed(1)}%</span>
                            </div>
                        </div>
                    </header>

                    {notification && (
                        <div className="fixed top-24 left-1/2 -translate-x-1/2 bg-slate-900 text-white px-6 py-2 rounded-full shadow-2xl z-[60] animate-bounce font-bold text-[10px] uppercase border border-white/20 tracking-widest">
                            {notification}
                        </div>
                    )}

                    <main className="max-w-4xl mx-auto p-4 space-y-6">
                        
                        {/* BANNER INTERACTIVO DE AUTORECUPERACIÓN */}
                        {betterBackups.length > 0 && (
                            <div className="bg-gradient-to-r from-amber-500 via-orange-500 to-red-600 text-white p-5 rounded-[2rem] shadow-xl flex flex-col md:flex-row justify-between items-center gap-4 animate-in slide-in-from-top duration-500">
                                <div className="flex items-center gap-4 text-center md:text-left">
                                    <div className="bg-white/20 p-3 rounded-2xl animate-pulse">
                                        <Icon name="search" size={28} className="text-yellow-200" />
                                    </div>
                                    <div>
                                        <h4 className="font-black text-sm uppercase tracking-wider">¡Detectamos copias con tu progreso!</h4>
                                        <p className="text-[11px] text-orange-100 font-semibold mt-0.5">Encontramos copias de seguridad de Miranda/Mateo con progreso real para tu iPad.</p>
                                    </div>
                                </div>
                                <button 
                                    onClick={() => setShowRecoveryModal(true)} 
                                    className="bg-white text-orange-700 px-6 py-3 rounded-2xl text-[11px] font-black uppercase shadow-lg hover:bg-slate-50 transition-all w-full md:w-auto"
                                >
                                    Ver y Restaurar
                                </button>
                            </div>
                        )}

                        <nav className="flex bg-white/90 backdrop-blur-md rounded-2xl shadow-sm border p-1 sticky top-28 z-40">
                            {[
                                { id: 'dashboard', label: 'Resumen', icon: 'trending-up' },
                                { id: 'album', label: 'Álbum', icon: 'layout-grid' },
                                { id: 'exchange', label: 'Compartir', icon: 'share-2' }
                            ].map(tab => (
                                <button key={tab.id} onClick={() => setActiveTab(tab.id)} className={`flex-1 flex items-center justify-center gap-2 py-3 rounded-xl transition-all ${activeTab === tab.id ? 'bg-blue-600 text-white shadow-lg font-bold' : 'text-slate-400 hover:bg-slate-50'}`}>
                                    <Icon name={tab.icon} size={18} />
                                    <span className="text-[10px] uppercase font-black">{tab.label}</span>
                                </button>
                            ))}
                        </nav>

                        {/* DASHBOARD */}
                        {activeTab === 'dashboard' && (
                            <div className="space-y-6 animate-in fade-in zoom-in-95">
                                <div className="bg-white p-8 rounded-[3rem] border shadow-sm flex flex-col md:flex-row items-center gap-10">
                                    <div className="relative w-40 h-44 flex items-center justify-center">
                                        <svg className="w-full h-full transform -rotate-90" viewBox="0 0 36 36">
                                            <circle cx="18" cy="18" r="15.9" fill="none" stroke="#f1f5f9" strokeWidth="3.5" />
                                            <circle cx="18" cy="18" r="15.9" fill="none" stroke="#2563eb" strokeWidth="3.5" strokeDasharray={`${stats.progress}, 100`} className="progress-ring" strokeLinecap="round" />
                                        </svg>
                                        <div className="absolute inset-0 flex items-center justify-center"><span className="text-4xl font-black text-slate-800 leading-none">{Math.round(stats.progress)}%</span></div>
                                    </div>
                                    <div className="flex-1 space-y-4 text-center md:text-left">
                                        <h2 className="text-2xl font-black text-slate-800 tracking-tight italic">¡Vamos {displayName}!</h2>
                                        <div className="grid grid-cols-2 gap-4">
                                            <div className="p-4 bg-blue-50 rounded-3xl border border-blue-100 flex flex-col items-center md:items-start">
                                                <p className="text-[10px] font-black text-blue-400 uppercase mb-1">Stickers</p>
                                                <p className="text-3xl font-black text-blue-700">{stats.ownedCount}</p>
                                            </div>
                                            <div className="p-4 bg-green-50 rounded-3xl border border-green-100 flex flex-col items-center md:items-start">
                                                <p className="text-[10px] font-black text-green-400 uppercase mb-1">Países OK</p>
                                                <p className="text-3xl font-black text-green-700">{stats.completedCount}</p>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                <div className="grid grid-cols-1 sm:grid-cols-2 gap-6">
                                    <div className="bg-white p-6 rounded-3xl border shadow-sm text-center flex flex-col justify-center">
                                        <h4 className="text-[10px] font-black uppercase tracking-[0.2em] mb-1 text-slate-500">Repetidas totales</h4>
                                        <p className="text-3xl font-black text-orange-600">{stats.repeatedCount}</p>
                                        <p className="text-[9px] text-slate-400 uppercase font-bold mt-1 tracking-widest italic">Para cambiar con amigos</p>
                                    </div>

                                    {/* SECCIÓN ANALÍTICA: PROBABILIDAD DE SOBRES */}
                                    <div className={`p-6 rounded-3xl border-2 flex flex-col justify-center text-center sm:text-left ${
                                        stats.probNew > 40 ? 'bg-green-50/50 border-green-100 text-green-900' : 'bg-orange-50/50 border-orange-100 text-orange-900'
                                    }`}>
                                        <h4 className="text-xs font-black uppercase tracking-wider mb-1 flex items-center justify-center sm:justify-start gap-1.5">
                                            <Icon name="info" size={16} /> Probabilidad de Sobre Nuevo
                                        </h4>
                                        <p className="text-3xl font-black">{Math.round(stats.probNew)}%</p>
                                        <p className="text-[10px] font-bold mt-1.5 leading-relaxed uppercase tracking-wide">
                                            {stats.probNew > 40 
                                                ? "¡Sigue abriendo sobres! La probabilidad de encontrar láminas nuevas aún es muy alta." 
                                                : "¡Peligro de repetidas! Conviene frenar la compra y enfocarse en intercambios."
                                            }
                                        </p>
                                    </div>
                                </div>

                                {/* SECCIÓN: PROGRESO POR SELECCIONES */}
                                <div className="bg-white p-6 rounded-[2.5rem] border shadow-sm space-y-4">
                                    <div className="flex flex-col sm:flex-row justify-between items-center gap-3 border-b pb-4">
                                        <div>
                                            <h4 className="text-xs font-black uppercase tracking-wider text-slate-800 flex items-center gap-1.5">
                                                <Icon name="award" className="text-yellow-500" /> Progreso por Selecciones
                                            </h4>
                                            <p className="text-[10px] text-slate-400 uppercase font-bold mt-0.5 tracking-wider">Avance individual, faltantes y repetidas</p>
                                        </div>
                                        <div className="flex bg-slate-100 p-1 rounded-xl w-full sm:w-auto">
                                            {[
                                                { id: 'pending', label: 'Incompletas' },
                                                { id: 'done', label: 'Listas' },
                                                { id: 'all', label: 'Todas' }
                                            ].map(btn => (
                                                <button
                                                    key={btn.id}
                                                    onClick={() => setDashboardFilter(btn.id)}
                                                    className={`flex-1 sm:flex-none px-3 py-1.5 rounded-lg text-[9px] font-black uppercase transition-all ${
                                                        dashboardFilter === btn.id ? 'bg-white text-blue-600 shadow-sm' : 'text-slate-500'
                                                    }`}
                                                >
                                                    {btn.label}
                                                </button>
                                            ))}
                                        </div>
                                    </div>

                                    {/* Grid de Avance por País */}
                                    <div className="grid grid-cols-2 md:grid-cols-3 gap-4 max-h-[360px] overflow-y-auto pr-1 border rounded-2xl p-2 bg-slate-50/50 scrollbar-hide">
                                        {filteredDashboardSections.map(s => (
                                            <div key={s.code} className="bg-white p-3.5 rounded-2xl border shadow-sm flex flex-col justify-between">
                                                <div className="flex justify-between items-start gap-1">
                                                    <span className="font-extrabold text-[12px] truncate flex items-center">
                                                        {renderFlagImg(s.code, s.flag)}
                                                        <span className="ml-1">{s.name}</span>
                                                    </span>
                                                    <span className="text-[9px] font-black text-slate-400 px-1 bg-slate-100 rounded">{s.code}</span>
                                                </div>
                                                <div className="flex justify-between items-end mt-3">
                                                    <div>
                                                        <div className="flex flex-wrap items-center gap-1">
                                                            <p className="text-[10px] text-slate-500 font-bold leading-none">{s.obtained}/{s.count} un.</p>
                                                            {s.repeated > 0 && (
                                                                <span className="text-[8px] font-black text-orange-600 bg-orange-50 px-1 py-0.5 rounded border border-orange-200 leading-none">
                                                                    {s.repeated} rep
                                                                </span>
                                                            )}
                                                        </div>
                                                        {s.isDone ? (
                                                            <p className="text-[9px] text-green-600 font-extrabold mt-1 uppercase tracking-tight">País Completo</p>
                                                        ) : (
                                                            <p className="text-[9px] text-red-500 font-extrabold mt-1 uppercase tracking-tight">Faltan: {s.missing}</p>
                                                        )}
                                                    </div>
                                                    <span className={`text-[10px] font-black px-1.5 py-0.5 rounded ${
                                                        s.isDone ? 'text-green-700 bg-green-50 border border-green-200' : 'text-blue-700 bg-blue-50'
                                                    }`}>
                                                        {Math.round(s.percent)}%
                                                    </span>
                                                </div>
                                                {/* Mini Barra de Progreso */}
                                                <div className="w-full bg-slate-100 h-1.5 rounded-full mt-2.5 overflow-hidden">
                                                    <div 
                                                        className={`h-full rounded-full transition-all duration-700 ${s.isDone ? 'bg-green-500' : 'bg-blue-500'}`} 
                                                        style={{ width: `${s.percent}%` }}
                                                    ></div>
                                                </div>
                                            </div>
                                        ))}
                                        {filteredDashboardSections.length === 0 && (
                                            <div className="col-span-full py-12 text-center text-slate-400 italic text-xs">
                                                No hay selecciones en esta categoría actualmente.
                                            </div>
                                        )}
                                    </div>
                                </div>

                                {/* RESPALDO MANUAL */}
                                <div className="bg-slate-900 text-white p-6 rounded-[2rem] flex flex-col md:flex-row justify-between items-center gap-4 shadow-xl">
                                    <div className="text-center md:text-left">
                                        <h3 className="font-black text-lg">Copia de Seguridad de Emergencia</h3>
                                        <p className="text-xs text-slate-400 uppercase font-bold tracking-widest">Guarda un archivo de respaldo en tu iPad por seguridad</p>
                                    </div>
                                    <div className="flex gap-2 w-full md:w-auto">
                                        <button onClick={exportData} className="flex-1 md:flex-none bg-blue-600 px-6 py-3 rounded-xl text-[10px] font-black uppercase active:scale-95 transition-all">Exportar .json</button>
                                        <label className="flex-1 md:flex-none bg-slate-700 px-6 py-3 rounded-xl text-[10px] font-black uppercase text-center cursor-pointer active:scale-95 transition-all">
                                            Importar .json <input type="file" className="hidden" accept=".json" onChange={importData} /></label>
                                    </div>
                                </div>

                                {/* PANEL DE DIAGNÓSTICO INTEGRADO */}
                                <div className="bg-slate-900 text-slate-300 p-5 rounded-[2rem] border-4 border-slate-800 font-mono text-xs space-y-3 shadow-2xl">
                                    <div className="flex justify-between items-center border-b border-slate-800 pb-2">
                                        <span className="font-bold text-blue-400 flex items-center gap-2">
                                            <span className="w-2 h-2 rounded-full bg-blue-500 animate-ping"></span>
                                            DIAGNÓSTICO EN TIEMPO REAL
                                        </span>
                                    </div>
                                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-2 text-[11px]">
                                        <div><b>Base de Datos:</b> pani-i2026</div>
                                        <div><b>Sincronización:</b> 
                                            <span className={`ml-1 font-bold ${cloudStatus === 'syncing' ? 'text-green-400' : 'text-red-400'}`}>
                                                {cloudStatus === 'syncing' ? '🟢 CONECTADO' : '🔴 LOCAL'}
                                            </span>
                                        </div>
                                        <div><b>ID del Canal:</b> {syncCode || "SIN CLAVE"}</div>
                                    </div>
                                    <div className="border-t border-slate-800 pt-2 space-y-1">
                                        <p className="text-[10px] text-slate-500 uppercase font-black">Historial:</p>
                                        <div className="max-h-24 overflow-y-auto space-y-1 scrollbar-hide text-[10px] text-slate-400">
                                            {logs.map((log, idx) => (
                                                <p key={idx} className="leading-tight">{log}</p>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* ÁLBUM */}
                        {activeTab === 'album' && (
                            <div className="space-y-4 animate-in fade-in">
                                <div className="bg-white p-5 rounded-3xl border shadow-sm flex flex-col md:flex-row gap-3 items-end">
                                    <div className="flex-1 w-full">
                                        <label className="text-[10px] font-black text-slate-400 uppercase mb-2 block tracking-widest italic">Seleccionar Selección</label>
                                        <div className="relative flex items-center gap-3">
                                            {renderFlagImg(selectedSection, currentSectionInfo.flag, "w-10 h-8 rounded-lg shadow-sm border")}
                                            <div className="relative flex-1">
                                                <select value={selectedSection} onChange={(e) => setSelectedSection(e.target.value)} className="w-full bg-slate-50 border-2 border-slate-100 p-4 rounded-2xl font-bold text-slate-700 outline-none focus:border-blue-500 transition-all text-sm appearance-none pr-10">
                                                    {SECTION_LIST.map(s => <option key={s.code} value={s.code}>{s.code} - {s.name}</option>)}
                                                </select>
                                                <div className="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-slate-400">
                                                    <Icon name="chevron-down" size={20} />
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                    <div className="w-full md:w-56 relative text-sm">
                                        <Icon name="search" size={18} className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400" />
                                        <input type="text" placeholder="MEX12, ARG10..." className="w-full pl-11 pr-4 py-4 border-2 border-slate-100 rounded-2xl font-bold outline-none focus:border-blue-500" value={filter} onChange={(e) => setFilter(e.target.value.toUpperCase())} />
                                    </div>
                                </div>

                                <div className="bg-white p-6 rounded-[2.5rem] border shadow-sm min-h-[400px]">
                                    <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-8 border-b pb-4 px-2">
                                        <h3 className="text-xl font-black text-slate-800 flex items-center gap-3 italic leading-none">
                                            {renderFlagImg(selectedSection, currentSectionInfo.flag, "w-8 h-6 rounded shadow-sm")}
                                            <span>{currentSectionInfo.name} ({currentSectionInfo.code})</span>
                                        </h3>
                                        <div className="flex bg-slate-100 p-1 rounded-xl w-full sm:w-auto">
                                            {[
                                                { id: 'all', label: 'Todas' },
                                                { id: 'missing', label: 'Faltantes' },
                                                { id: 'repeated', label: 'Repetidas' }
                                            ].map(opt => (
                                                <button
                                                    key={opt.id}
                                                    onClick={() => setAlbumSubFilter(opt.id)}
                                                    className={`flex-1 sm:flex-none px-3 py-1.5 rounded-lg text-[9px] font-black uppercase transition-all ${
                                                        albumSubFilter === opt.id ? 'bg-white text-blue-600 shadow-sm font-bold' : 'text-slate-500'
                                                    }`}
                                                >
                                                    {opt.label}
                                                </button>
                                            ))}
                                        </div>
                                    </div>
                                    <div className="grid grid-cols-2 sm:grid-cols-4 md:grid-cols-5 gap-4">
                                        {displayedStickers.map(sticker => (
                                            <div key={sticker.id} className={`relative p-4 rounded-[2.5rem] border-2 transition-all flex flex-col items-center justify-center gap-3 h-36 ${sticker.count > 0 ? (sticker.count > 1 ? 'bg-orange-50 border-orange-400 shadow-orange-100/50' : 'bg-blue-50 border-blue-400 shadow-blue-100/50') : 'bg-white border-slate-100 opacity-60'} shadow-lg group hover:scale-105 active:scale-95`}>
                                                <span className={`text-xl font-black tracking-tighter leading-none ${sticker.count > 1 ? 'text-orange-800' : sticker.count > 0 ? 'text-blue-800' : 'text-slate-400'}`}>{sticker.id}</span>
                                                <div className="flex items-center gap-3">
                                                    <button onClick={() => updateCount(sticker.id, -1)} className="w-10 h-10 flex items-center justify-center bg-white rounded-2xl border shadow-sm text-red-500 active:bg-red-50 transition-colors"><Icon name="minus" size={16}/></button>
                                                    <span className="font-black text-xl w-4 text-center">{sticker.count}</span>
                                                    <button onClick={() => updateCount(sticker.id, 1)} className="w-10 h-10 flex items-center justify-center bg-white rounded-full border shadow-sm text-green-500 active:bg-green-50 transition-colors"><Icon name="plus" size={16}/></button>
                                                </div>
                                                {sticker.count > 1 && <div className="absolute -top-2 -right-2 bg-orange-600 text-white text-[10px] font-black px-2.5 py-1 rounded-full shadow-xl border-2 border-white ring-4 ring-orange-50 animate-in zoom-in">x{sticker.count}</div>}
                                            </div>
                                        ))}
                                    </div>
                                    {displayedStickers.length === 0 && (
                                        <div className="py-20 text-center text-slate-400 italic text-sm">
                                            No hay láminas en esta sección con el filtro seleccionado.
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}

                        {/* COMPARTIR Y COMPARAR */}
                        {activeTab === 'exchange' && (
                            <div className="space-y-6 animate-in fade-in">
                                {/* SECCIÓN: EL MATCHMAKER (COMPARTIR CON UN AMIGO) */}
                                <div className="bg-white p-6 rounded-[2.5rem] border shadow-sm space-y-4">
                                    <div>
                                        <h4 className="text-xs font-black uppercase tracking-wider text-slate-800 flex items-center gap-1.5">
                                            <Icon name="git-compare" className="text-indigo-600" /> Comparar Intercambio con un Amigo
                                        </h4>
                                        <p className="text-[10px] text-slate-400 uppercase font-bold mt-0.5 tracking-wider">Cruza tus repetidas con lo que le falta a tu amigo automáticamente</p>
                                    </div>
                                    <div className="flex gap-2 max-w-md">
                                        <input 
                                            type="text" 
                                            placeholder="CÓDIGO DE TU AMIGO (Ej: MATEO26)" 
                                            value={friendCode}
                                            onChange={(e) => setFriendCode(e.target.value.toUpperCase())}
                                            className="flex-1 px-4 py-3 border-2 rounded-2xl font-black uppercase text-xs outline-none focus:border-blue-500"
                                        />
                                        <button 
                                            onClick={checkFriendSync}
                                            className="bg-indigo-600 text-white px-5 py-3 rounded-2xl text-[10px] font-black uppercase shadow-lg shadow-indigo-100 active:scale-95 transition-transform"
                                        >
                                            Comparar
                                        </button>
                                    </div>

                                    {exchangeAnalysis && (
                                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 pt-2 card-enter">
                                            <div className="p-4 bg-green-50 border border-green-100 rounded-3xl space-y-2">
                                                <h5 className="font-extrabold text-xs text-green-800 uppercase tracking-tight flex items-center gap-1">
                                                    🎁 Le puedes dar a {friendName}:
                                                </h5>
                                                <div className="max-h-32 overflow-y-auto text-[10px] font-mono font-bold text-green-700 bg-white/50 p-2.5 rounded-xl border border-green-200">
                                                    {exchangeAnalysis.iCanGive.length > 0 
                                                        ? exchangeAnalysis.iCanGive.join(', ') 
                                                        : "No tienes repetidas que le falten."
                                                    }
                                                </div>
                                                <p className="text-[9px] text-green-600 font-bold uppercase">{exchangeAnalysis.iCanGive.length} láminas listas para regalarle.</p>
                                            </div>

                                            <div className="p-4 bg-blue-50 border border-blue-100 rounded-3xl space-y-2">
                                                <h5 className="font-extrabold text-xs text-blue-800 uppercase tracking-tight flex items-center gap-1">
                                                    🎯 {friendName} te puede dar a ti:
                                                </h5>
                                                <div className="max-h-32 overflow-y-auto text-[10px] font-mono font-bold text-blue-700 bg-white/50 p-2.5 rounded-xl border border-blue-200">
                                                    {exchangeAnalysis.friendCanGive.length > 0 
                                                        ? exchangeAnalysis.friendCanGive.join(', ') 
                                                        : "Tu amigo no tiene repetidas que te falten."
                                                    }
                                                </div>
                                                <p className="text-[9px] text-blue-600 font-bold uppercase">{exchangeAnalysis.friendCanGive.length} láminas listas para recibir.</p>
                                            </div>
                                        </div>
                                    )}
                                </div>

                                <div className="bg-white p-8 rounded-[3rem] border shadow-sm text-center">
                                    <div className="flex justify-center gap-4 mb-8">
                                        {[
                                            {id: 'both', label: 'Todo', icon: 'list'},
                                            {id: 'repeats', label: 'Repetidas', icon: 'refresh-ccw'},
                                            {id: 'missing', label: 'Faltantes', icon: 'alert-circle'}
                                        ].map(m => (
                                            <button key={m.id} onClick={() => setShareMode(m.id)} className={`flex-1 flex flex-col items-center gap-2 p-5 rounded-3xl border-2 transition-all font-black text-[10px] uppercase tracking-tighter ${shareMode === m.id ? 'bg-blue-600 border-blue-600 text-white shadow-xl' : 'text-slate-400 bg-slate-50'}`}>
                                                <Icon name={m.icon} />
                                                {m.label}
                                            </button>
                                        ))}
                                    </div>
                                    <div className="bg-slate-900 text-green-400 p-8 rounded-[2rem] font-mono text-left text-[11px] mb-8 max-h-80 overflow-y-auto border-4 border-slate-800 leading-relaxed scrollbar-hide select-all shadow-inner">
                                        {generateShareText()}
                                    </div>
                                    <button onClick={copyToClipboard} className="w-full bg-green-600 hover:bg-green-700 text-white font-black py-6 rounded-3xl flex items-center justify-center gap-4 transition-all shadow-2xl active:scale-95 text-lg group">
                                        <Icon name="copy" size={28} className="group-hover:rotate-12 transition-transform" /> COPIAR LISTA
                                    </button>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* VENTANA DE AJUSTES */}
                    {showSettings && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[100] flex items-center justify-center p-4">
                            <div className="bg-white rounded-[2.5rem] p-6 max-w-sm w-full shadow-2xl space-y-6 card-enter">
                                <div className="flex justify-between items-start">
                                    <div className="flex items-center gap-2">
                                        <Icon name="cloud-lightning" className="text-blue-600" />
                                        <h3 className="text-lg font-black text-slate-800">Sincronización Familiar</h3>
                                    </div>
                                    <button onClick={() => setShowSettings(false)} className="text-slate-400 hover:text-slate-600"><Icon name="x" /></button>
                                </div>

                                <div className="space-y-4">
                                    <div>
                                        <label className="text-[10px] font-black text-slate-400 uppercase mb-1 block tracking-wider leading-none">Tu Código Personal</label>
                                        <input 
                                            type="text" 
                                            placeholder="EJ: MIRANDA26" 
                                            className="w-full px-4 py-3 border-2 rounded-2xl font-black uppercase text-sm outline-none focus:border-blue-500" 
                                            value={inputSyncCode}
                                            onChange={(e) => setInputSyncCode(e.target.value.toUpperCase())}
                                        />
                                        <p className="text-[9px] text-slate-400 mt-1 leading-normal">Escribe tu código único (ej: MIRANDA26) para que todos los dispositivos carguen y guarden lo mismo.</p>
                                        
                                        {/* Historial de Códigos Rápidos */}
                                        {syncHistory.length > 0 && (
                                            <div className="mt-2.5">
                                                <p className="text-[9px] font-black text-slate-400 uppercase leading-none mb-1.5">Códigos de este iPad:</p>
                                                <div className="flex flex-wrap gap-1.5">
                                                    {syncHistory.map(histCode => (
                                                        <button 
                                                            key={histCode}
                                                            type="button"
                                                            onClick={() => setInputSyncCode(histCode)}
                                                            className="px-2.5 py-1 bg-slate-100 hover:bg-blue-50 text-slate-600 hover:text-blue-700 font-bold text-[10px] rounded-lg border border-slate-200 transition-colors"
                                                        >
                                                            {histCode}
                                                        </button>
                                                    ))}
                                                </div>
                                            </div>
                                        )}
                                    </div>

                                    <div>
                                        <label className="text-[10px] font-black text-slate-400 uppercase mb-1 block tracking-wider leading-none">Nombre del Coleccionista</label>
                                        <input 
                                            type="text" 
                                            placeholder="EJ: Miranda o Mateo" 
                                            className="w-full px-4 py-3 border-2 rounded-2xl font-black text-sm outline-none focus:border-blue-500" 
                                            value={inputCollectorName}
                                            onChange={(e) => setInputCollectorName(e.target.value)}
                                        />
                                        <p className="text-[9px] text-slate-400 mt-1 leading-normal">Personaliza el saludo y los títulos de la aplicación.</p>
                                    </div>
                                    
                                    {/* BOTÓN DIRECTO DE DESCARGA FORZADA (Por si acaso un dispositivo se queda atorado) */}
                                    <button 
                                        type="button"
                                        onClick={() => {
                                            forceDownloadFromCloud();
                                            setShowSettings(false);
                                        }} 
                                        className="w-full bg-amber-600 hover:bg-amber-500 text-white font-black py-2.5 rounded-2xl text-[10px] uppercase shadow-lg transition-colors flex items-center justify-center gap-1.5"
                                    >
                                        <Icon name="cloud-download" size={12} /> Traer datos de la Nube al iPad (Sincronizar)
                                    </button>

                                    {/* Botón de Emergencia de Escaneo manual */}
                                    <button 
                                        type="button"
                                        onClick={runFullRecoveryScan} 
                                        className="w-full bg-slate-100 hover:bg-slate-200 text-slate-700 font-black py-2.5 rounded-2xl text-[10px] uppercase border border-slate-200 transition-colors flex items-center justify-center gap-1.5"
                                    >
                                        <Icon name="search" size={12} /> Buscar respaldos perdidos en la nube
                                    </button>
                                </div>

                                <button onClick={handleSaveConfig} className="w-full bg-blue-600 hover:bg-blue-500 text-white font-black py-4 rounded-2xl text-xs uppercase shadow-lg shadow-blue-200">
                                    Guardar Ajustes
                                </button>
                            </div>
                        </div>
                    )}

                    {/* MODAL DEL CENTRO DE RECUPERACIÓN DE ESTAMPAS */}
                    {showRecoveryModal && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[110] flex items-center justify-center p-4">
                            <div className="bg-white rounded-[2.5rem] p-6 max-w-lg w-full shadow-2xl space-y-6 card-enter">
                                <div className="flex justify-between items-start border-b pb-4">
                                    <div>
                                        <h3 className="text-lg font-black text-slate-800 flex items-center gap-2">
                                            <Icon name="life-buoy" className="text-orange-600" />
                                            Centro de Recuperación de Estampas
                                        </h3>
                                        <p className="text-xs text-slate-400 font-bold uppercase mt-0.5">Selecciona la copia que deseas restaurar</p>
                                    </div>
                                    <button onClick={() => setShowRecoveryModal(false)} className="text-slate-400 hover:text-slate-600"><Icon name="x" /></button>
                                </div>

                                {/* LISTA DE COPIAS ENCONTRADAS POR ESCÁNER */}
                                {allBackups.length > 0 ? (
                                    <div className="space-y-3 max-h-[300px] overflow-y-auto pr-1 scrollbar-hide">
                                        <p className="text-[9px] font-black text-slate-400 uppercase leading-none">Copias detectadas en tu base de datos:</p>
                                        {allBackups.map((backup, idx) => (
                                            <div key={idx} className="bg-slate-50 p-4 rounded-2xl border flex justify-between items-center hover:border-blue-300 transition-all shadow-sm">
                                                <div className="space-y-1">
                                                    <span className={`px-2.5 py-0.5 rounded-full text-[9px] font-black uppercase ${
                                                        backup.type === 'local' ? 'bg-teal-100 text-teal-700' : 'bg-blue-100 text-blue-700'
                                                    }`}>
                                                        {backup.type === 'local' ? 'Dispositivo (iPad/Cel)' : 'Nube (Google)'}
                                                    </span>
                                                    <h4 className="font-extrabold text-sm text-slate-700 mt-1">{backup.source}</h4>
