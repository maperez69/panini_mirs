<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Miranda Panini Tracker 2026</title>
    <!-- React y Babel para ejecución directa -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Tailwind CSS para el diseño profesional -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Iconos Lucide -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        
        @keyframes progress { from { stroke-dasharray: 0 100; } }
        .progress-ring { animation: progress 1.2s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
        .card-enter { animation: fadeInUp 0.3s ease-out forwards; }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans">
    <div id="root"></div>

    <script type="module">
        // Importación dinámica de Firebase para compatibilidad directa en GitHub Pages
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        window.FirebaseCore = { initializeApp, getFirestore, getAuth, signInAnonymously, onSnapshot, doc, setDoc };
    </script>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // CONFIGURACIÓN DE TU FIREBASE PERSONAL (Obtenida de tu captura de pantalla)
        const CONFIG_PERSONAL_FIREBASE = {
            apiKey: "AIzaSyCpxBz20qqF6Xus6iYqJY_Vw5t7L5suiwg",
            authDomain: "pani-i2026.firebaseapp.com",
            projectId: "pani-i2026",
            storageBucket: "pani-i2026.firebasestorage.app",
            messagingSenderId: "993320660945",
            appId: "1:993320660945:web:603b888456a7e3765e7af0",
            measurementId: "G-N2S2QD23T5"
        };

        // Diccionario oficial de jugadores
        const PLAYER_DATABASE = {
            "ARG1": "Escudo", "ARG2": "Equipo", "ARG3": "Emiliano Martínez", "ARG4": "Nahuel Molina", "ARG5": "Cristian Romero",
            "ARG6": "Nicolás Otamendi", "ARG7": "Enzo Fernández", "ARG8": "Alexis Mac Allister", "ARG9": "Rodrigo De Paul",
            "ARG10": "Lionel Messi", "ARG11": "Julián Álvarez", "ARG12": "Lautaro Martínez",
            "MEX1": "Escudo", "MEX2": "Equipo", "MEX3": "Luis Malagón", "MEX4": "César Montes", "MEX5": "Johan Vásquez",
            "MEX6": "Israel Reyes", "MEX7": "Jesús Gallardo", "MEX8": "Edson Álvarez", "MEX9": "Carlos Rodríguez",
            "MEX10": "Orbelín Pineda", "MEX11": "Hirving Lozano", "MEX12": "Santiago Giménez", "MEX13": "Raúl Jiménez",
            "CC1": "Lamine Yamal", "CC2": "Lautaro Martínez", "CC3": "Christian Pulisic"
        };

        const SECTION_LIST = [
            { code: "FWC", name: "FIFA World Cup", count: 20 },
            { code: "MEX", name: "México", count: 20 },
            { code: "RSA", name: "Sudáfrica", count: 20 },
            { code: "KOR", name: "Corea del Sur", count: 20 },
            { code: "CZE", name: "Rep. Checa", count: 20 },
            { code: "CAN", name: "Canadá", count: 20 },
            { code: "BIH", name: "Bosnia & Herz.", count: 20 },
            { code: "QAT", name: "Qatar", count: 20 },
            { code: "SUI", name: "Suiza", count: 20 },
            { code: "BRA", name: "Brasil", count: 20 },
            { code: "MAR", name: "Marruecos", count: 20 },
            { code: "HAI", name: "Haití", count: 20 },
            { code: "SCO", name: "Escocia", count: 20 },
            { code: "USA", name: "Estados Unidos", count: 20 },
            { code: "PAR", name: "Paraguay", count: 20 },
            { code: "AUS", name: "Australia", count: 20 },
            { code: "TUR", name: "Turquía", count: 20 },
            { code: "GER", name: "Alemania", count: 20 },
            { code: "CUW", name: "Curazao", count: 20 },
            { code: "CIV", name: "Costa de Marfil", count: 20 },
            { code: "ECU", name: "Ecuador", count: 20 },
            { code: "NED", name: "Países Bajos", count: 20 },
            { code: "JPN", name: "Japón", count: 20 },
            { code: "SWE", name: "Suecia", count: 20 },
            { code: "TUN", name: "Túnez", count: 20 },
            { code: "BEL", name: "Bélgica", count: 20 },
            { code: "EGY", name: "Egipto", count: 20 },
            { code: "IRN", name: "Irán", count: 20 },
            { code: "NZL", name: "Nueva Zelanda", count: 20 },
            { code: "ESP", name: "España", count: 20 },
            { code: "CPV", name: "Cabo Verde", count: 20 },
            { code: "KSA", name: "Arabia Saudita", count: 20 },
            { code: "URU", name: "Uruguay", count: 20 },
            { code: "FRA", name: "Francia", count: 20 },
            { code: "SEN", name: "Senegal", count: 20 },
            { code: "IRQ", name: "Irak", count: 20 },
            { code: "NOR", name: "Noruega", count: 20 },
            { code: "ARG", name: "Argentina", count: 20 },
            { code: "ALG", name: "Argelia", count: 20 },
            { code: "AUT", name: "Austria", count: 20 },
            { code: "JOR", name: "Jordania", count: 20 },
            { code: "POR", name: "Portugal", count: 20 },
            { code: "COD", name: "R.D. Congo", count: 20 },
            { code: "UZB", name: "Uzbekistán", count: 20 },
            { code: "COL", name: "Colombia", count: 20 },
            { code: "ENG", name: "Inglaterra", count: 20 },
            { code: "CRO", name: "Croacia", count: 20 },
            { code: "GHA", name: "Ghana", count: 20 },
            { code: "PAN", name: "Panamá", count: 20 },
            { code: "CC", name: "Coca-Cola", count: 12 }
        ];

        const APP_ID = "miranda-tracker-v10-prod";

        const generateInitialStickers = () => {
            const initial = [];
            SECTION_LIST.forEach(section => {
                for (let i = 1; i <= section.count; i++) {
                    initial.push({ id: `${section.code}${i}`, code: section.code, num: i, count: 0 });
                }
            });
            return initial;
        };

        const Icon = ({ name, size = 20, className = "" }) => {
            useEffect(() => { if (window.lucide) lucide.createIcons(); }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const App = () => {
            const [stickers, setStickers] = useState(() => {
                const saved = localStorage.getItem(APP_ID);
                return saved ? JSON.parse(saved) : generateInitialStickers();
            });

            const [activeTab, setActiveTab] = useState('dashboard');
            const [filter, setFilter] = useState('');
            const [selectedSection, setSelectedSection] = useState('MEX');
            const [notification, setNotification] = useState(null);
            const [shareMode, setShareMode] = useState('both');
            const [showSettings, setShowSettings] = useState(false);

            // Sincronización en la Nube
            const [syncCode, setSyncCode] = useState(() => localStorage.getItem('panini_sync_code') || '');
            const [cloudStatus, setCloudStatus] = useState('local'); // 'local', 'syncing', 'error'
            const [currentUser, setCurrentUser] = useState(null);

            const dbInstance = useRef(null);
            const unsubscribeFirestore = useRef(null);

            // Guardar localmente siempre (Fail-safe)
            useEffect(() => {
                localStorage.setItem(APP_ID, JSON.stringify(stickers));
            }, [stickers]);

            // Inicialización de Firebase
            useEffect(() => {
                const initFirebase = async () => {
                    if (!CONFIG_PERSONAL_FIREBASE.apiKey) {
                        setCloudStatus('local');
                        return;
                    }

                    try {
                        if (!window.FirebaseCore) {
                            setTimeout(initFirebase, 500);
                            return;
                        }

                        const { initializeApp, getFirestore, getAuth, signInAnonymously } = window.FirebaseCore;
                        
                        const app = initializeApp(CONFIG_PERSONAL_FIREBASE);
                        dbInstance.current = getFirestore(app);
                        const auth = getAuth(app);

                        // Autenticar de forma anónima
                        await signInAnonymously(auth);
                        setCurrentUser(auth.currentUser);
                        setCloudStatus('syncing');
                    } catch (err) {
                        console.error("Fallo de conexión a Firebase:", err);
                        setCloudStatus('error');
                    }
                };
                initFirebase();
            }, []);

            // Escuchar cambios de Firestore en tiempo real (Lectura)
            useEffect(() => {
                if (!currentUser || !syncCode || !dbInstance.current) return;

                const { doc, onSnapshot } = window.FirebaseCore;
                const appId = "miranda-tracker-app";
                const docRef = doc(dbInstance.current, 'artifacts', appId, 'public', 'data', 'user_stickers', syncCode.trim().toUpperCase());

                if (unsubscribeFirestore.current) unsubscribeFirestore.current();

                setCloudStatus('syncing');
                unsubscribeFirestore.current = onSnapshot(docRef, (docSnap) => {
                    if (docSnap.exists()) {
                        const data = docSnap.data();
                        if (data.stickers) {
                            setStickers(data.stickers);
                        }
                    }
                }, (err) => {
                    console.error("Firestore sync failed, check rules:", err);
                    setCloudStatus('error');
                });

                localStorage.setItem('panini_sync_code', syncCode.trim().toUpperCase());

                return () => {
                    if (unsubscribeFirestore.current) unsubscribeFirestore.current();
                };
            }, [currentUser, syncCode]);

            // Subir datos actualizados a la nube (Escritura)
            const pushToCloud = async (newStickers) => {
                if (!currentUser || !syncCode || !dbInstance.current) return;
                const { doc, setDoc } = window.FirebaseCore;
                const appId = "miranda-tracker-app";
                const docRef = doc(dbInstance.current, 'artifacts', appId, 'public', 'data', 'user_stickers', syncCode.trim().toUpperCase());
                
                try {
                    await setDoc(docRef, { stickers: newStickers, lastUpdated: new Date() }, { merge: true });
                } catch (e) {
                    console.error("Fallo al escribir en la nube:", e);
                }
            };

            const stats = useMemo(() => {
                const total = stickers.length;
                const ownedCount = stickers.filter(s => s.count > 0).length;
                const repeatedCount = stickers.reduce((acc, s) => acc + (s.count > 1 ? s.count - 1 : 0), 0);
                const progress = (ownedCount / total) * 100;
                
                const sectionsData = SECTION_LIST.map(section => {
                    const group = stickers.filter(s => s.code === section.code);
                    const obtained = group.filter(s => s.count > 0).length;
                    return { ...section, obtained, isDone: obtained === section.count, percent: (obtained / section.count) * 100 };
                });

                const completedCount = sectionsData.filter(s => s.isDone).length;
                return { total, ownedCount, repeatedCount, progress, completedCount, sectionsData };
            }, [stickers]);

            const updateCount = (id, delta) => {
                const next = stickers.map(s => s.id === id ? { ...s, count: Math.max(0, s.count + delta) } : s);
                setStickers(next);
                if (syncCode) pushToCloud(next);
            };

            const generateShareText = () => {
                const mList = stickers.filter(s => s.count === 0).map(s => PLAYER_DATABASE[s.id] ? `${s.id}(${PLAYER_DATABASE[s.id]})` : s.id).join(', ');
                const rList = stickers.filter(s => s.count > 1).map(s => PLAYER_DATABASE[s.id] ? `${s.id}(${PLAYER_DATABASE[s.id]})` : s.id).join(', ');
                let t = "⚽ *ALBUM PANINI MIRANDA 2026* ⚽\n";
                if (shareMode === 'both' || shareMode === 'repeats') t += `\n✅ *REPETIDAS PARA CAMBIAR:* \n${rList || 'Ninguna'}\n`;
                if (shareMode === 'both' || shareMode === 'missing') t += `\n❌ *ME FALTAN:* \n${mList}\n`;
                return t + "\n_¡Intercambiemos!_";
            };

            const copyToClipboard = () => {
                const el = document.createElement('textarea');
                el.value = generateShareText(); document.body.appendChild(el);
                el.select(); document.execCommand('copy');
                document.body.removeChild(el);
                setNotification("¡Lista copiada!");
                setTimeout(() => setNotification(null), 3000);
            };

            const displayedStickers = useMemo(() => {
                if (!filter) {
                    return stickers.filter(s => s.code === selectedSection);
                }
                const search = filter.toUpperCase();
                return stickers.filter(s => {
                    const pName = (PLAYER_DATABASE[s.id] || "").toUpperCase();
                    return s.id.includes(search) || pName.includes(search);
                });
            }, [stickers, filter, selectedSection]);

            const currentSectionInfo = SECTION_LIST.find(s => s.code === selectedSection) || SECTION_LIST[0];

            return (
                <div className="min-h-screen pb-24">
                    {/* Header */}
                    <header className="bg-gradient-to-r from-blue-700 via-indigo-800 to-blue-900 text-white p-6 shadow-xl sticky top-0 z-50">
                        <div className="max-w-4xl mx-auto flex justify-between items-center text-center sm:text-left">
                            <div className="flex items-center gap-3">
                                <button onClick={() => setShowSettings(true)} className="p-2 bg-white/10 hover:bg-white/20 rounded-lg shadow-inner transition-all flex items-center gap-2">
                                    <Icon name="cloud" className={cloudStatus === 'syncing' ? 'text-green-400' : cloudStatus === 'error' ? 'text-red-400 animate-pulse' : 'text-yellow-400'} size={24} />
                                    <span className="text-[9px] font-black uppercase tracking-wider hidden sm:inline">Sincronización</span>
                                </button>
                                <div>
                                    <h1 className="text-xl font-black italic tracking-tighter">MIRANDA 2026</h1>
                                    <p className="text-blue-200 text-[8px] font-bold uppercase tracking-widest leading-none">
                                        {syncCode ? `Código: ${syncCode}` : "SÓLO DISPOSITIVO"}
                                    </p>
                                </div>
                            </div>
                            <div className="text-right">
                                <span className="text-3xl font-black italic">{stats.progress.toFixed(1)}%</span>
                            </div>
                        </div>
                    </header>

                    {notification && (
                        <div className="fixed top-24 left-1/2 -translate-x-1/2 bg-slate-900 text-white px-6 py-2 rounded-full shadow-2xl z-[60] animate-bounce font-bold text-[10px] uppercase border border-white/20 tracking-widest">
                            {notification}
                        </div>
                    )}

                    <main className="max-w-4xl mx-auto p-4 space-y-6">
                        <nav className="flex bg-white/90 backdrop-blur-md rounded-2xl shadow-sm border p-1 sticky top-28 z-40">
                            {[
                                { id: 'dashboard', label: 'Resumen', icon: 'trending-up' },
                                { id: 'album', label: 'Álbum', icon: 'layout-grid' },
                                { id: 'exchange', label: 'Compartir', icon: 'share-2' }
                            ].map(tab => (
                                <button key={tab.id} onClick={() => setActiveTab(tab.id)} className={`flex-1 flex items-center justify-center gap-2 py-3 rounded-xl transition-all ${activeTab === tab.id ? 'bg-blue-600 text-white shadow-lg font-bold' : 'text-slate-400 hover:bg-slate-50'}`}>
                                    <Icon name={tab.icon} size={18} />
                                    <span className="text-[10px] uppercase font-black">{tab.label}</span>
                                </button>
                            ))}
                        </nav>

                        {/* DASHBOARD */}
                        {activeTab === 'dashboard' && (
                            <div className="space-y-6 animate-in fade-in zoom-in-95">
                                <div className="bg-white p-8 rounded-[3rem] border shadow-sm flex flex-col md:flex-row items-center gap-10">
                                    <div className="relative w-40 h-44 flex items-center justify-center">
                                        <svg className="w-full h-full transform -rotate-90" viewBox="0 0 36 36">
                                            <circle cx="18" cy="18" r="15.9" fill="none" stroke="#f1f5f9" strokeWidth="3.5" />
                                            <circle cx="18" cy="18" r="15.9" fill="none" stroke="#2563eb" strokeWidth="3.5" strokeDasharray={`${stats.progress}, 100`} className="progress-ring" strokeLinecap="round" />
                                        </svg>
                                        <div className="absolute inset-0 flex items-center justify-center"><span className="text-4xl font-black text-slate-800 leading-none">{Math.round(stats.progress)}%</span></div>
                                    </div>
                                    <div className="flex-1 space-y-4 text-center md:text-left">
                                        <h2 className="text-2xl font-black text-slate-800 tracking-tight italic">¡Vamos Miranda!</h2>
                                        <div className="grid grid-cols-2 gap-4">
                                            <div className="p-4 bg-blue-50 rounded-3xl border border-blue-100 flex flex-col items-center md:items-start">
                                                <p className="text-[10px] font-black text-blue-400 uppercase mb-1">Stickers</p>
                                                <p className="text-3xl font-black text-blue-700">{stats.ownedCount}</p>
                                            </div>
                                            <div className="p-4 bg-green-50 rounded-3xl border border-green-100 flex flex-col items-center md:items-start">
                                                <p className="text-[10px] font-black text-green-400 uppercase mb-1">Países OK</p>
                                                <p className="text-3xl font-black text-green-700">{stats.completedCount}</p>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                <div className="bg-white p-6 rounded-3xl border shadow-sm text-center">
                                    <h4 className="text-[10px] font-black uppercase tracking-[0.2em] mb-1 text-slate-500">Repetidas totales</h4>
                                    <p className="text-3xl font-black text-orange-600">{stats.repeatedCount}</p>
                                    <p className="text-[9px] text-slate-400 uppercase font-bold mt-1 tracking-widest italic">Para cambiar con amigos</p>
                                </div>

                                <div className="bg-white p-6 rounded-3xl border shadow-sm">
                                    <h4 className="text-[10px] font-black uppercase tracking-[0.2em] mb-4 flex items-center gap-2 text-slate-500"><Icon name="award" className="text-yellow-500" /> Logros Desbloqueados</h4>
                                    <div className="flex flex-wrap gap-2 max-h-32 overflow-y-auto scrollbar-hide">
                                        {stats.sectionsData.filter(s => s.isDone).map(s => <span key={s.code} className="px-3 py-1 bg-green-100 text-green-700 rounded-full text-[10px] font-black uppercase border border-green-200">{s.code}</span>)}
                                        {stats.completedCount === 0 && <p className="text-xs text-slate-400 italic">Aquí aparecerán los países que completes al 100%.</p>}
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* ÁLBUM */}
                        {activeTab === 'album' && (
                            <div className="space-y-4 animate-in fade-in">
                                <div className="bg-white p-5 rounded-3xl border shadow-sm flex flex-col md:flex-row gap-3 items-end">
                                    <div className="flex-1 w-full">
                                        <label className="text-[10px] font-black text-slate-400 uppercase mb-2 block tracking-widest italic">Seleccionar Selección</label>
                                        <div className="relative">
                                            <select value={selectedSection} onChange={(e) => setSelectedSection(e.target.value)} className="w-full bg-slate-50 border-2 border-slate-100 p-4 rounded-2xl font-bold text-slate-700 outline-none focus:border-blue-500 transition-all text-sm appearance-none">
                                                {SECTION_LIST.map(s => <option key={s.code} value={s.code}>{s.code} - {s.name}</option>)}
                                            </select>
                                            <div className="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-slate-400">
                                                <Icon name="chevron-down" size={20} />
                                            </div>
                                        </div>
                                    </div>
                                    <div className="w-full md:w-56 relative text-sm">
                                        <Icon name="search" size={18} className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400" />
                                        <input type="text" placeholder="Messi o MEX12..." className="w-full pl-11 pr-4 py-4 border-2 border-slate-100 rounded-2xl font-bold outline-none focus:border-blue-500" value={filter} onChange={(e) => setFilter(e.target.value.toUpperCase())} />
                                    </div>
                                </div>

                                <div className="bg-white p-6 rounded-[2.5rem] border shadow-sm min-h-[400px]">
                                    <div className="flex justify-between items-center mb-8 px-2">
                                        <h3 className="text-xl font-black text-slate-800 flex items-center gap-3 italic">
                                            <span className="bg-blue-600 text-white text-[10px] px-2.5 py-1 rounded-lg uppercase tracking-widest">{currentSectionInfo.code}</span> {currentSectionInfo.name}
                                        </h3>
                                        {stats.sectionsData.find(s => s.code === selectedSection)?.isDone && (
                                            <span className="text-green-600 font-bold text-[10px] uppercase border border-green-200 px-3 py-1 bg-green-50 rounded-full flex items-center gap-1 leading-none"><Icon name="check-circle" size={12}/> COMPLETADO</span>
                                        )}
                                    </div>
                                    <div className="grid grid-cols-2 sm:grid-cols-4 md:grid-cols-5 gap-4">
                                        {displayedStickers.map(sticker => (
                                            <div key={sticker.id} className={`relative p-4 rounded-[2.5rem] border-2 transition-all flex flex-col items-center justify-between h-44 ${sticker.count > 0 ? (sticker.count > 1 ? 'bg-orange-50 border-orange-400 shadow-orange-100/50' : 'bg-blue-50 border-blue-400 shadow-blue-100/50') : 'bg-white border-slate-100 opacity-60'} shadow-lg group hover:scale-105 active:scale-95`}>
                                                <div className="flex flex-col items-center text-center">
                                                    <span className={`text-xl font-black tracking-tighter leading-none ${sticker.count > 1 ? 'text-orange-800' : sticker.count > 0 ? 'text-blue-800' : 'text-slate-400'}`}>{sticker.id}</span>
                                                    <span className={`text-[9px] font-bold uppercase mt-1 px-1 line-clamp-2 ${sticker.count > 0 ? 'text-slate-700' : 'text-slate-300'}`}>{PLAYER_DATABASE[sticker.id] || "–"}</span>
                                                </div>
                                                <div className="flex items-center gap-3">
                                                    <button onClick={() => updateCount(sticker.id, -1)} className="w-10 h-10 flex items-center justify-center bg-white rounded-2xl border shadow-sm text-red-500 active:bg-red-50 transition-colors"><Icon name="minus" size={16}/></button>
                                                    <span className="font-black text-xl w-4 text-center">{sticker.count}</span>
                                                    <button onClick={() => updateCount(sticker.id, 1)} className="w-10 h-10 flex items-center justify-center bg-white rounded-full border shadow-sm text-green-500 active:bg-green-50 transition-colors"><Icon name="plus" size={16}/></button>
                                                </div>
                                                {sticker.count > 1 && <div className="absolute -top-2 -right-2 bg-orange-600 text-white text-[10px] font-black px-2.5 py-1 rounded-full shadow-xl border-2 border-white ring-4 ring-orange-50 animate-in zoom-in">x{sticker.count}</div>}
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* COMPARTIR */}
                        {activeTab === 'exchange' && (
                            <div className="bg-white p-8 rounded-[3rem] border shadow-sm text-center animate-in fade-in">
                                <div className="flex justify-center gap-4 mb-8">
                                    {[
                                        {id: 'both', label: 'Todo', icon: 'list'},
                                        {id: 'repeats', label: 'Repetidas', icon: 'refresh-ccw'},
                                        {id: 'missing', label: 'Faltantes', icon: 'alert-circle'}
                                    ].map(m => (
                                        <button key={m.id} onClick={() => setShareMode(m.id)} className={`flex-1 flex flex-col items-center gap-2 p-5 rounded-3xl border-2 transition-all font-black text-[10px] uppercase tracking-tighter ${shareMode === m.id ? 'bg-blue-600 border-blue-600 text-white shadow-xl' : 'text-slate-400 bg-slate-50 hover:bg-slate-100'}`}>
                                            <Icon name={m.icon} />
                                            {m.label}
                                        </button>
                                    ))}
                                </div>
                                <div className="bg-slate-900 text-green-400 p-8 rounded-[2rem] font-mono text-left text-[11px] mb-8 max-h-80 overflow-y-auto border-4 border-slate-800 leading-relaxed scrollbar-hide select-all shadow-inner">
                                    {generateShareText()}
                                </div>
                                <button onClick={copyToClipboard} className="w-full bg-green-600 hover:bg-green-700 text-white font-black py-6 rounded-3xl flex items-center justify-center gap-4 transition-all shadow-2xl active:scale-95 text-lg group">
                                    <Icon name="copy" size={28} className="group-hover:rotate-12 transition-transform" /> COPIAR LISTA
                                </button>
                            </div>
                        )}
                    </main>

                    {/* VENTANA DE AJUSTES */}
                    {showSettings && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[100] flex items-center justify-center p-4">
                            <div className="bg-white rounded-[2.5rem] p-6 max-w-sm w-full shadow-2xl space-y-6 card-enter">
                                <div className="flex justify-between items-start">
                                    <div className="flex items-center gap-2">
                                        <Icon name="cloud-lightning" className="text-blue-600" />
                                        <h3 className="text-lg font-black text-slate-800">Sincronización Familiar</h3>
                                    </div>
                                    <button onClick={() => setShowSettings(false)} className="text-slate-400 hover:text-slate-600"><Icon name="x" /></button>
                                </div>

                                <div className="space-y-4">
                                    <div>
                                        <label className="text-[10px] font-black text-slate-400 uppercase mb-1 block tracking-wider leading-none">Código Compartido</label>
                                        <input 
                                            type="text" 
                                            placeholder="EJ: MIRANDA26" 
                                            className="w-full px-4 py-3 border-2 rounded-2xl font-black uppercase text-sm outline-none focus:border-blue-500" 
                                            value={syncCode}
                                            onChange={(e) => setSyncCode(e.target.value.toUpperCase())}
                                        />
                                        <p className="text-[9px] text-slate-400 mt-1 leading-normal">Escribe un código único (ej: MIRANDA26) para que todos los dispositivos carguen y guarden lo mismo.</p>
                                    </div>
                                </div>

                                <button onClick={() => setShowSettings(false)} className="w-full bg-blue-600 hover:bg-blue-500 text-white font-black py-4 rounded-2xl text-xs uppercase shadow-lg shadow-blue-200">
                                    Conectar Dispositivo
                                </button>
                            </div>
                        </div>
                    )}

                    <footer className="fixed bottom-0 left-0 right-0 bg-white/80 backdrop-blur-md border-t p-4 text-center z-50"><p className="text-[10px] text-slate-400 font-black uppercase tracking-[0.3em]">Miranda Tracker Cloud v10.0</p></footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
