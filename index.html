                                                    <p className="text-[10px] text-slate-400 font-medium">
                                                        {backup.type === 'cloud' && `Último cambio: ${backup.lastUpdated}`}
                                                    </p>
                                                    <div className="flex gap-3 text-[10px] font-bold text-slate-500 mt-1 uppercase">
                                                        <span>✅ {backup.ownedCount} únicas</span>
                                                        <span>🔸 {backup.repeatedCount} repetidas</span>
                                                    </div>
                                                </div>
                                                <button 
                                                    onClick={() => {
                                                        setStickers(normalizeStickers(backup.stickers));
                                                        if (backup.type === 'cloud') {
                                                            setSyncCode(backup.docId);
                                                            setCollectorName(backup.collectorName);
                                                            localStorage.setItem('panini_sync_code', backup.docId);
                                                            localStorage.setItem('panini_collector_name', backup.collectorName);
                                                        } else {
                                                            if (syncCode) pushToCloud(backup.stickers);
                                                        }
                                                        setShowRecoveryModal(false);
                                                        setNotification("¡Progreso restaurado correctamente!");
                                                        setTimeout(() => setNotification(null), 3000);
                                                    }} 
                                                    className="bg-blue-600 hover:bg-blue-500 text-white px-4 py-2.5 rounded-xl text-[10px] font-black uppercase shadow-lg shadow-blue-100 transition-all"
                                                >
                                                    Cargar
                                                </button>
                                            </div>
                                        ))}
                                    </div>
                                ) : (
                                    <div className="py-8 text-center text-slate-400 italic text-sm">
                                        No se han detectado respaldos automáticos aún. Usa la Copia de Seguridad de abajo.
                                    </div>
                                )}
                                
                                <div className="p-4 bg-blue-50 rounded-2xl border text-xs text-blue-800 leading-relaxed font-semibold">
                                    💡 <b>Consejo familiar:</b> Puedes cargar cualquiera de estas copias de seguridad de la lista. Al hacerlo, el progreso actual del dispositivo será reemplazado de inmediato por el de tu respaldo.
                                </div>
                            </div>
                        </div>
                    )}

                    {/* MODAL DE RESOLUCIÓN DE CONFLICTOS FAMILIAR */}
                    {conflictState.show && (
                        <div className="fixed inset-0 bg-slate-900/80 backdrop-blur-md z-[120] flex items-center justify-center p-4">
                            <div className="bg-white rounded-[2.5rem] p-8 max-w-md w-full shadow-2xl space-y-6 card-enter">
                                <div className="text-center space-y-2">
                                    <div className="inline-block bg-amber-100 text-amber-600 p-4 rounded-full animate-bounce">
                                        <Icon name="alert-triangle" size={32} />
                                    </div>
                                    <h3 className="text-xl font-black text-slate-800">¡Conflicto de Sincronización!</h3>
                                    <p className="text-xs text-slate-500 leading-relaxed font-semibold">
                                        El progreso en este dispositivo es diferente al guardado en la nube para el canal <b className="text-blue-600">MIRANDA26</b>. ¿Qué deseas hacer?
                                    </p>
                                </div>

                                <div className="space-y-4">
                                    {/* Opción A: Mantener y subir local (por ejemplo el 82% de Miranda) */}
                                    <button 
                                        onClick={() => resolveConflict(true)}
                                        className="w-full text-left p-4 rounded-2xl border-2 border-blue-500 hover:bg-blue-50/50 transition-all space-y-1 group"
                                    >
                                        <div className="flex justify-between items-center">
                                            <span className="font-extrabold text-sm text-blue-700">Usar progreso del dispositivo</span>
                                            <span className="bg-blue-100 text-blue-700 font-bold text-[10px] px-2.5 py-1 rounded-full group-hover:scale-105 transition-transform">Recomendado</span>
                                        </div>
                                        <p className="text-xs text-slate-500 font-medium">Llevar las <b className="text-slate-800">{conflictState.localCount} estampas</b> de este dispositivo a la nube para actualizar a todos los demás.</p>
                                    </button>

                                    {/* Opción B: Descargar de la nube (el 70.1% de Marco) */}
                                    <button 
                                        onClick={() => resolveConflict(false)}
                                        className="w-full text-left p-4 rounded-2xl border-2 border-slate-100 hover:border-amber-300 hover:bg-slate-50 transition-all space-y-1"
                                    >
                                        <div className="flex justify-between items-center">
                                            <span className="font-extrabold text-sm text-slate-700">Descargar de la Nube</span>
                                        </div>
                                        <p className="text-xs text-slate-500 font-medium">Reemplazar los datos de este dispositivo con las <b className="text-slate-800">{conflictState.cloudCount} estampas</b> guardadas en internet.</p>
                                    </button>
                                </div>

                                <div className="p-3 bg-slate-50 rounded-xl border text-[10px] text-slate-400 font-semibold leading-relaxed">
